# Do not use Bluetooth Proxy: not statble, alway offline.
substitutions:
  hostname: 'esp32-cam-gun'

   
esphome:
  name: $hostname
  name_add_mac_suffix: true



esp32:
  board: esp32dev
  framework:
    type: arduino


# Enable logging
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: cam-1.local

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: 'hotspot.$hostname.hotspot' 
    password: "jEvC7RTUNb7X"


# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password


# Enable logging
logger:


captive_portal:
    
    

esp32_camera:
  external_clock:
    pin: GPIO0
    frequency: 20MHz

  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32


  # Image settings
  name: '$hostname Camera'
  resolution: 800x600
  jpeg_quality: 10
  idle_framerate: 0.1fps
  


# believe the available GPIO on the board are 12, 13, 14 & 15. 
# WARNING: GPIO0 / GPIO4 / GPIO12 is a Strapping PIN and should be avoided.
# Attaching external pullup/down resistors to strapping pins can cause unexpected failures.
# See https://esphome.io/guides/faq.html#why-am-i-getting-a-warning-about-strapping-pins

output:
# White LED
  - platform: ledc
    channel: 2
    pin: GPIO4
    id: espCamLED

# Red statuslight
  - platform: gpio
    pin:
      number: GPIO33
      inverted: True
    id: gpio_33


# Transistor Base
  - platform: gpio
    pin:
      number: GPIO12
      inverted: True
    id: gpio_12



light:
  - platform: monochromatic
    output: espCamLED
    name: '$hostname Light'
 
  - platform: binary
    output: gpio_33
    name: '$hostname Red'


  - platform: binary
    output: gpio_12
    name: '$hostname Transistor'


switch:
  - platform: restart
    name: '$hostname restart'


binary_sensor:
  - platform: status
    name: '$hostname status'
    
  - platform: gpio
    pin: 
      number: GPIO14
      mode:
        input: true
        pulldown: true
    
    name: '$hostname PIR'
    device_class: motion


sensor:
    # camera WIFI
  - platform: wifi_signal
    name: '$hostname WiFi Signal'

