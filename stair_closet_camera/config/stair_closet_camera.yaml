---
substitutions:
  hostname: 'stair-closet-camera'
  friendly_name: 'Stair Closet Camera'

esphome:
  name: $hostname
  name_add_mac_suffix: true

esp32:
  board: esp32dev
  framework:
    type: arduino

packages:
  base_config: !include ../../common/base_config.yaml
  wifi_fallback: !include ../../common/wifi_fallback.yaml
  common_sensors: !include ../../common/common_sensors.yaml

esp32_camera:
  external_clock:
    pin: GPIO0
    frequency: 20MHz

  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32

  # Image settings
  name: '$hostname Camera'
  resolution: 1600X1200
  jpeg_quality: 10  # best 10 to poorest 63
  max_framerate: 10.0fps
  idle_framerate: 0.1fps
  vertical_flip: false
  horizontal_mirror: false

# Available GPIO on the board are 12, 13, 14 & 15.
# WARNING: GPIO0 / GPIO4 / GPIO12 is a Strapping PIN and should be avoided.
# Attaching external pullup/down resistors to strapping pins
# can cause unexpected failures.
# https://esphome.io/guides/faq.html#why-am-i-getting-a-warning-about-strapping-pins

output:
  # White LED
  - platform: ledc
    channel: 2
    pin: GPIO4
    id: espCamLED

  # Red status light
  - platform: gpio
    pin:
      number: GPIO33
      inverted: true
    id: gpio_33

light:
  - platform: monochromatic
    output: espCamLED
    name: '$hostname White LED'

  - platform: binary
    output: gpio_33
    name: '$hostname Red LED'

switch:
  # Transistor Base
  - platform: gpio
    pin:
      number: 13
    id: GPIO13
    name: '$hostname LED Switch'

binary_sensor:
  - platform: gpio
    name: '$hostname Door Sensor'
    id: 'door_sensor'
    device_class: door
    pin:
      number: 14
      mode: INPUT_PULLUP

    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: door_sensor
            then:
              - switch.turn_on: GPIO13
            else:
              - switch.turn_off: GPIO13

