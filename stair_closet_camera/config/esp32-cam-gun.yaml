# Do not use Bluetooth Proxy: not statble, alway offline.
substitutions:
  hostname: 'gun-camera'

   
esphome:
  name: $hostname
  name_add_mac_suffix: true



esp32:
  board: esp32dev
  framework:
    type: arduino


# Enable logging
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: cam-1.local

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: 'hotspot.$hostname.hotspot' 
    password: "jEvC7RTUNb7X"


# Enable Home Assistant API
api:
  encryption:
    key: "KytqgkyuUV5z/ofXcgfC0e+7cEajkDI+yhw1GA6N5Ro="

ota:
  password: !secret ota_password


# Enable logging
logger:


captive_portal:
    
    
# esp32_camera_web_server:
#   - port: 8080
#     mode: stream


esp32_camera:
  external_clock:
    pin: GPIO0
    frequency: 20MHz

  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32


  # Image settings
  name: '$hostname Camera'
  resolution: 1600X1200
  jpeg_quality: 10  #best 10 to poorest 63
  max_framerate: 10.0fps
  idle_framerate: 0.1fps
  vertical_flip: false
  horizontal_mirror: false
  


# believe the available GPIO on the board are 12, 13, 14 & 15. 
# WARNING: GPIO0 / GPIO4 / GPIO12 is a Strapping PIN and should be avoided.
# Attaching external pullup/down resistors to strapping pins can cause unexpected failures.
# See https://esphome.io/guides/faq.html#why-am-i-getting-a-warning-about-strapping-pins

output:
# White LED
  - platform: ledc
    channel: 2
    pin: GPIO4
    id: espCamLED


# Red statuslight
  - platform: gpio
    pin:
      number: GPIO33
      inverted: True
    id: gpio_33



light:
  - platform: monochromatic
    output: espCamLED
    name: '$hostname Light'
 
  - platform: binary
    output: gpio_33
    name: '$hostname Red'



switch:
  - platform: restart
    name: '$hostname restart'

  # Transistor Base
  - platform: gpio
    pin: 
      number: 13
    id: GPIO13
    name: '$hostname LED Switch'


binary_sensor:
  - platform: gpio
    name: '$hostname Door Sensor'
    id: 'door_sensor'
    device_class: door
    pin:
      number: 14
      mode: INPUT_PULLUP
    
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: door_sensor
            
            then:
              - switch.turn_on: GPIO13  
                    
            else:
              - switch.turn_off: GPIO13        

  - platform: status
    name: '$hostname status'
    
    

sensor:
    # camera WIFI
  - platform: wifi_signal
    name: '$hostname WiFi Signal'
