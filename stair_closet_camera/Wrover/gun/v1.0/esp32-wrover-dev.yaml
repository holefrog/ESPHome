---
substitutions:
  hostname: 'gun'

esphome:
  name: $hostname
  name_add_mac_suffix: true

esp32:
  board: esp-wrover-kit
  framework:
    type: arduino

# Enable logging
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: '$hostname.local'

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: 'hotspot.$hostname'
    password: "jEvC7RTUNb7X"

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

captive_portal:

esp32_camera:
  external_clock:
    pin: GPIO21
    frequency: 20MHz

  i2c_pins:
    sda: GPIO26
    scl: GPIO27

  data_pins:
    - GPIO4   # Y2 / D0
    - GPIO5   # Y3
    - GPIO18  # Y4
    - GPIO19  # Y5
    - GPIO36  # Y6
    - GPIO39  # Y7
    - GPIO34  # Y8
    - GPIO35  # Y9 / D7

  vsync_pin: GPIO25    # VSYNC
  href_pin: GPIO23     # HREF
  pixel_clock_pin: GPIO22  # PCLK

  # Image settings
  name: '$hostname Camera'
  resolution: 1600X1200
  jpeg_quality: 10  # Best quality: 10, poorest: 63
  max_framerate: 10.0fps
  idle_framerate: 0.1fps
  vertical_flip: false
  horizontal_mirror: false


output:
  - platform: gpio
    pin:
      number: GPIO02
      inverted: false
    id: blueLED

light:
  - platform: binary
    output: blueLED
    name: '$hostname Blue LED'

switch:
  - platform: restart
    name: '$hostname restart'

  # Transistor switch
  - platform: gpio
    pin:
      number: GPIO13
    id: GPIO13
    name: '$hostname LED Switch'

binary_sensor:
  - platform: gpio
    name: '$hostname Door Sensor'
    id: 'door_sensor'
    device_class: door
    pin:
      number: 14
      mode: INPUT_PULLUP

    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: door_sensor
            then:
              - switch.turn_on: GPIO13
            else:
              - switch.turn_off: GPIO13

  - platform: status
    name: '$hostname status'

sensor:
  # Camera WiFi signal
  - platform: wifi_signal
    name: '$hostname WiFi Signal'
