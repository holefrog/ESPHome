substitutions:
  hostname: 'backlit_frame'
  name: 'backlit_frame'
  delay_time: 60s

packages:
  base_config: !include ../../common/base_config.yaml
  wifi_fallback: !include ../../common/wifi_fallback.yaml
  common_sensors: !include ../../common/common_sensors.yaml

# Board
esp8266:
  board: esp01_1m
  framework:
    version: recommended





# Begin

switch:
  - platform: gpio
    pin: GPIO0
    id: gpio_0
    name: '$hostname Light'
    inverted: true

  - platform: restart
    name: '$hostname restart'

script:
  - id: pir_timer
    mode: restart
    then:
      - switch.turn_on: gpio_0
      - delay: ${delay_time}
      - switch.turn_off: gpio_0


binary_sensor:
  # pullup: false. Make sure PIR input is low when not detected.
  - platform: gpio
    name: '$hostname PIR'
    id: 'thisPIR'
    device_class: motion
    pin: 
      number: GPIO3
      mode:
        input: true
        pullup: false
    on_press:
      then:
        - script.execute: pir_timer
